<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>reads.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- ── TOPBAR ── -->
  <div id="topbar">
    <div id="topbar-inner">
      <div id="logo">reads<span>.</span></div>
      <input id="search" type="text" placeholder="Search articles…" autocomplete="off" />
      <button class="icon-btn" id="theme-btn" title="Toggle dark mode" onclick="toggleTheme()">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path
            d="M8 1v1M8 14v1M1 8H2M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
      <button id="add-btn" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        Add
      </button>
    </div>
  </div>

  <!-- ── GRID VIEW ── -->
  <div id="grid-view">
    <div id="count-bar">loading…</div>
    <div id="grid">
      <div id="no-results">No articles match your search.</div>
    </div>
  </div>

  <!-- ── ARTICLE VIEW ── -->
  <div id="article-view">
    <div id="article-inner">
      <button id="back" onclick="closeArticle()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        Back
      </button>
      <div id="fm-area"></div>
      <div id="prose"></div>
    </div>
  </div>

  <!-- ── ADD MODAL ── -->
  <div id="modal-overlay" onclick="overlayClick(event)">
    <div id="modal">
      <div id="modal-default">
        <h2>Add article</h2>
        <p>Paste a Medium URL and we'll scrape it for you.</p>
        <input id="url-input" type="url" placeholder="https://medium.com/…" autocomplete="off" />
        <div id="modal-actions">
          <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn confirm" onclick="startScrape()">Fetch article</button>
        </div>
      </div>
      <div id="modal-loading" style="display:none">
        <div id="loading-overlay">
          <div class="spinner"></div>
          <div>
            <div class="loading-text">Fetching article…</div>
            <div class="loading-url" id="loading-url-text"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast"></div>

  <script src="../assets/js/main.js"></script>
</body>

</html>
